apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dev-world-bnetserver-tls-secret
  labels:
    app.kubernetes.io/name: dev-world-bnetserver
    app.kubernetes.io/part-of: game-server
spec:
  secretName: dev-world-bnetserver-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - play.devv2.rp-wow.ru
  usages:
    - digital signature
    - key encipherment
    - server auth
