apiVersion: v1
kind: Service
metadata:
  name: dev-world-mariadb
  labels:
    app.kubernetes.io/name: dev-world-mariadb
    app.kubernetes.io/part-of: game-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dev-world-mariadb
    app.kubernetes.io/part-of: game-server
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: dev-world-mariadb-headless
  labels:
    app.kubernetes.io/name: dev-world-mariadb
    app.kubernetes.io/part-of: game-server
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: dev-world-mariadb
    app.kubernetes.io/part-of: game-server
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
