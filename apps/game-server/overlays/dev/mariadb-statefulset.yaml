apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dev-world-mariadb
  labels:
    app.kubernetes.io/name: dev-world-mariadb
    app.kubernetes.io/part-of: game-server
spec:
  serviceName: dev-world-mariadb-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-world-mariadb
      app.kubernetes.io/part-of: game-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-world-mariadb
        app.kubernetes.io/part-of: game-server
    spec:
      automountServiceAccountToken: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1001
      containers:
        - name: mariadb
          image: bitnamilegacy/mariadb:11.8.2-debian-12-r0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: BITNAMI_DEBUG
              value: "false"
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-world-mariadb-auth
                  key: mariadb-root-password
            - name: MARIADB_USER
              value: service
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-world-mariadb-auth
                  key: mariadb-password
            - name: MARIADB_DATABASE
              value: my_database
            - name: MARIADB_ENABLE_SSL
              value: "yes"
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: data
              mountPath: /bitnami/mariadb
            - name: custom-init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: cert
              mountPath: /opt/bitnami/mariadb/certs
      volumes:
        - name: custom-init-scripts
          configMap:
            name: dev-world-mariadb-init-scripts
        - name: cert
          secret:
            secretName: dev-world-mariadb-crt
            defaultMode: 256
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: dev-world-mariadb
          app.kubernetes.io/part-of: game-server
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
        volumeMode: Filesystem
