apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
resources:
  - ../../base
  - config-files.yaml
  - ingress.yaml
  - ru-ingress.yaml
  - mysql-service.yaml
  - mysql-statefulset.yaml
  - storage-pvcs.yaml
generators:
  - secret-generator.yaml
replicas:
  - name: site
    count: 1
patches:
  - path: node-placement-patch.yaml
