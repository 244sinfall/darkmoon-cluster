apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vpn
resources:
  - ../../base
generators:
  - secret-generator.yaml
patches:
  - path: deployments-dev-patch.yaml
replicas:
  - name: wg-rest-api-default
    count: 0
  - name: wg-rest-api-internal
    count: 1
  - name: wg-rest-api-external
    count: 1
