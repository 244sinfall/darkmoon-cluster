apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-rest-api-external
  labels:
    app.kubernetes.io/name: wg-rest-api
    app.kubernetes.io/part-of: vpn
    app.kubernetes.io/component: external
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-rest-api
      app.kubernetes.io/component: external
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-rest-api
        app.kubernetes.io/part-of: vpn
        app.kubernetes.io/component: external
    spec:
      containers:
        - name: wg-rest-api
          image: leonovk/wg-rest-api
          env:
            - name: AUTH_DIGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vpn-auth-tokens
                  key: external
            - name: ENVIRONMENT
              value: "production"
            - name: WG_DEFAULT_ADDRESS
              value: "172.31.244.x"
            - name: WG_ALLOWED_IPS
              value: "0.0.0.0/0"
            - name: WG_DEFAULT_DNS
              value: "1.1.1.1, 8.8.8.8"
            - name: WG_PRE_UP
              value: sysctl net.ipv4.ip_forward=1
          ports:
            - name: wireguard
              containerPort: 51820
              protocol: UDP
            - name: api
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/wireguard
              name: wg-config
          securityContext:
            privileged: true
      volumes:
        - name: wg-config
          persistentVolumeClaim:
            claimName: wg-rest-pvc-external
