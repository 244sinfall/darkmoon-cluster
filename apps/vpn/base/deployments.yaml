apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-rest-api-default
  labels:
    app.kubernetes.io/name: wg-rest-api
    app.kubernetes.io/part-of: vpn
    app.kubernetes.io/component: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-rest-api
      app.kubernetes.io/component: default
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-rest-api
        app.kubernetes.io/part-of: vpn
        app.kubernetes.io/component: default
    spec:
      containers:
        - name: wg-rest-api
          image: leonovk/wg-rest-api
          env:
            - name: AUTH_DIGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vpn-auth-tokens
                  key: default
            - name: ENVIRONMENT
              value: "production"
            - name: WG_PRE_UP
              value: sysctl net.ipv4.ip_forward=1
            - name: CONNECTING_CLIENT_LIMIT
              value: "16"
            - name: CONNECTING_CLIENT_LIMIT_6
              value: "112"
          ports:
            - name: wireguard
              containerPort: 51820
              protocol: UDP
            - name: api
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/wireguard
              name: wg-config
          securityContext:
            privileged: true
      volumes:
        - name: wg-config
          persistentVolumeClaim:
            claimName: wg-rest-pvc-default
---
