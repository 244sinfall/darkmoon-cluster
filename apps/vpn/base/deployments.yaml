apiVersion: apps/v1
kind: Deployment
metadata:
  name: amnezia-wg-easy
  labels:
    app.kubernetes.io/name: amnezia-wg-easy
    app.kubernetes.io/part-of: vpn
    app.kubernetes.io/component: amnezia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: amnezia-wg-easy
      app.kubernetes.io/component: amnezia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amnezia-wg-easy
        app.kubernetes.io/part-of: vpn
        app.kubernetes.io/component: amnezia
    spec:
      containers:
        - name: amnezia-wg-easy
          image: ghcr.io/w0rng/amnezia-wg-easy:14
          imagePullPolicy: Always
          env:
            - name: PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: vpn-auth-tokens
                  key: externalAWG
            - name: LANG
              value: "en"
            - name: PORT
              value: "51821"
            - name: WG_PORT
              value: "51820"
            - name: WG_CONFIG_PORT
              value: "31823"
            - name: WG_ALLOWED_IPS
              value: "0.0.0.0/0"
            - name: WG_DEFAULT_DNS
              value: "1.1.1.1, 8.8.8.8"
            - name: WG_PRE_UP
              value: "sysctl -w net.ipv4.ip_forward=1; sysctl -w net.ipv4.conf.all.src_valid_mark=1"
          ports:
            - name: wireguard
              containerPort: 51820
              protocol: UDP
            - name: ui
              containerPort: 51821
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/wireguard
              name: amnezia-wg-config
            - mountPath: /dev/net/tun
              name: dev-net-tun
          securityContext:
            privileged: true
      volumes:
        - name: amnezia-wg-config
          persistentVolumeClaim:
            claimName: amnezia-wg-easy-config
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
