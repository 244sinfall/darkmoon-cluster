apiVersion: v1
kind: Service
metadata:
  name: wg-default-udp-external
  labels:
    app.kubernetes.io/name: wg-rest-api
    app.kubernetes.io/part-of: vpn
    app.kubernetes.io/component: default
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: wg-rest-api
    app.kubernetes.io/component: default
  ports:
    - name: wireguard
      protocol: UDP
      port: 51820
      targetPort: wireguard
      nodePort: 31820
---
apiVersion: v1
kind: Service
metadata:
  name: wg-default-api-internal
  labels:
    app.kubernetes.io/name: wg-rest-api
    app.kubernetes.io/part-of: vpn
    app.kubernetes.io/component: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wg-rest-api
    app.kubernetes.io/component: default
  ports:
    - name: api
      protocol: TCP
      port: 3000
      targetPort: api
