apiVersion: v1
kind: ConfigMap
metadata:
  name: amnezia-wg-easy-default-cidr-patch
  labels:
    app.kubernetes.io/name: amnezia-wg-easy
    app.kubernetes.io/part-of: vpn
    app.kubernetes.io/component: amnezia-default
data:
  amnezia-default-cidr.js: |
    'use strict';

    const cidr = Number(process.env.WG_DEFAULT_CIDR || '24');

    if (cidr !== 24) {
      const fs = require('node:fs/promises');
      const path = require('node:path');
      const crypto = require('node:crypto');

      const WireGuard = require('/app/lib/WireGuard');
      const Util = require('/app/lib/Util');
      const config = require('/app/config');

      const {
        WG_PATH,
        WG_HOST,
        WG_PORT,
        WG_CONFIG_PORT,
        WG_MTU,
        WG_DEFAULT_DNS,
        WG_DEFAULT_ADDRESS,
        WG_PERSISTENT_KEEPALIVE,
        WG_ALLOWED_IPS,
        WG_PRE_UP,
        WG_POST_UP,
        WG_PRE_DOWN,
        WG_POST_DOWN,
        JC,
        JMIN,
        JMAX,
        S1,
        S2,
        H1,
        H2,
        H3,
        H4,
      } = config;

      const hostBits = 32 - cidr;
      const hostOctets = hostBits / 8;
      const maxHost = (2 ** hostBits) - 2;
      const templateParts = WG_DEFAULT_ADDRESS.split('.');
      const wildcardIndexes = templateParts
        .map((part, index) => (part === 'x' ? index : -1))
        .filter((index) => index !== -1);

      if (!Number.isInteger(cidr) || cidr < 8 || cidr > 30) {
        throw new Error(`WG_DEFAULT_CIDR must be an integer from 8 to 30, got ${process.env.WG_DEFAULT_CIDR}`);
      }

      if (!Number.isInteger(hostOctets) || wildcardIndexes.length < hostOctets) {
        throw new Error(`WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS} cannot represent a /${cidr} pool`);
      }

      function addressForHost(host) {
        const parts = [...templateParts];
        let remaining = host;

        for (let i = wildcardIndexes.length - 1; i >= wildcardIndexes.length - hostOctets; i -= 1) {
          parts[wildcardIndexes[i]] = String(remaining % 256);
          remaining = Math.floor(remaining / 256);
        }

        if (remaining > 0) {
          throw new Error(`Host index ${host} is outside WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS}`);
        }

        return parts.join('.');
      }

      WireGuard.prototype.__buildConfig = async function __buildConfig() {
        this.__configPromise = Promise.resolve().then(async () => {
          if (!WG_HOST) {
            throw new Error('WG_HOST Environment Variable Not Set!');
          }

          try {
            return JSON.parse(await fs.readFile(path.join(WG_PATH, 'wg0.json'), 'utf8'));
          } catch (err) {
            const privateKey = await Util.exec('wg genkey');
            const publicKey = await Util.exec(`echo ${privateKey} | wg pubkey`, {
              log: 'echo ***hidden*** | wg pubkey',
            });

            return {
              server: {
                privateKey,
                publicKey,
                address: addressForHost(1),
                jc: JC,
                jmin: JMIN,
                jmax: JMAX,
                s1: S1,
                s2: S2,
                h1: H1,
                h2: H2,
                h3: H3,
                h4: H4,
              },
              clients: {},
            };
          }
        });

        return this.__configPromise;
      };

      WireGuard.prototype.__saveConfig = async function __saveConfig(wgConfig) {
        let result = `
    # Note: Do not edit this file directly.
    # Your changes will be overwritten!

    # Server
    [Interface]
    PrivateKey = ${wgConfig.server.privateKey}
    Address = ${wgConfig.server.address}/${cidr}
    ListenPort = ${WG_PORT}
    PreUp = ${WG_PRE_UP}
    PostUp = ${WG_POST_UP}
    PreDown = ${WG_PRE_DOWN}
    PostDown = ${WG_POST_DOWN}
    Jc = ${wgConfig.server.jc}
    Jmin = ${wgConfig.server.jmin}
    Jmax = ${wgConfig.server.jmax}
    S1 = ${wgConfig.server.s1}
    S2 = ${wgConfig.server.s2}
    H1 = ${wgConfig.server.h1}
    H2 = ${wgConfig.server.h2}
    H3 = ${wgConfig.server.h3}
    H4 = ${wgConfig.server.h4}
    `;

        for (const [clientId, client] of Object.entries(wgConfig.clients)) {
          if (!client.enabled) continue;

          result += `

    # Client: ${client.name} (${clientId})
    [Peer]
    PublicKey = ${client.publicKey}
    ${client.preSharedKey ? `PresharedKey = ${client.preSharedKey}\n` : ''}AllowedIPs = ${client.address}/32`;
        }

        await fs.writeFile(path.join(WG_PATH, 'wg0.json'), JSON.stringify(wgConfig, false, 2), { mode: 0o660 });
        await fs.writeFile(path.join(WG_PATH, 'wg0.conf'), result, { mode: 0o600 });
      };

      WireGuard.prototype.getClientConfiguration = async function getClientConfiguration({ clientId }) {
        const wgConfig = await this.getConfig();
        const client = await this.getClient({ clientId });

        return `
    [Interface]
    PrivateKey = ${client.privateKey ? `${client.privateKey}` : 'REPLACE_ME'}
    Address = ${client.address}/${cidr}
    ${WG_DEFAULT_DNS ? `DNS = ${WG_DEFAULT_DNS}\n` : ''}\
    ${WG_MTU ? `MTU = ${WG_MTU}\n` : ''}\
    Jc = ${wgConfig.server.jc}
    Jmin = ${wgConfig.server.jmin}
    Jmax = ${wgConfig.server.jmax}
    S1 = ${wgConfig.server.s1}
    S2 = ${wgConfig.server.s2}
    H1 = ${wgConfig.server.h1}
    H2 = ${wgConfig.server.h2}
    H3 = ${wgConfig.server.h3}
    H4 = ${wgConfig.server.h4}

    [Peer]
    PublicKey = ${wgConfig.server.publicKey}
    ${client.preSharedKey ? `PresharedKey = ${client.preSharedKey}\n` : ''}AllowedIPs = ${WG_ALLOWED_IPS}
    PersistentKeepalive = ${WG_PERSISTENT_KEEPALIVE}
    Endpoint = ${WG_HOST}:${WG_CONFIG_PORT}`;
      };

      WireGuard.prototype.createClient = async function createClient({ name, expiredDate }) {
        if (!name) {
          throw new Error('Missing: Name');
        }

        const wgConfig = await this.getConfig();
        const privateKey = await Util.exec('wg genkey');
        const publicKey = await Util.exec(`echo ${privateKey} | wg pubkey`, {
          log: 'echo ***hidden*** | wg pubkey',
        });
        const preSharedKey = await Util.exec('wg genpsk');

        let address;
        const usedAddresses = new Set(Object.values(wgConfig.clients).map((client) => client.address));

        for (let host = 2; host <= maxHost; host += 1) {
          const candidate = addressForHost(host);

          if (!usedAddresses.has(candidate)) {
            address = candidate;
            break;
          }
        }

        if (!address) {
          throw new Error('Maximum number of clients reached.');
        }

        const id = crypto.randomUUID();
        const client = {
          id,
          name,
          address,
          privateKey,
          publicKey,
          preSharedKey,
          createdAt: new Date(),
          updatedAt: new Date(),
          expiredAt: null,
          enabled: true,
        };

        if (expiredDate) {
          client.expiredAt = new Date(expiredDate);
          client.expiredAt.setHours(23);
          client.expiredAt.setMinutes(59);
          client.expiredAt.setSeconds(59);
        }

        wgConfig.clients[id] = client;
        await this.saveConfig();
        return client;
      };
    }
