apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backend-postgres
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: rpwowru
      containers:
        - name: postgres
          image: postgres:17-alpine
          readinessProbe:
            exec:
              command:
              - sh
              - -ec
              - pg_isready -h "$POD_IP" -p 5432 -U postgres
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
              - sh
              - -ec
              - pg_isready -h "$POD_IP" -p 5432 -U postgres
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
        volumeMode: Filesystem
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: rpwowru
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
        volumeMode: Filesystem
