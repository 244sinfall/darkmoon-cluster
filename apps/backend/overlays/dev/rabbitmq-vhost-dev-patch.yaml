apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
spec:
  template:
    spec:
      containers:
        - name: rabbitmq
          env:
            - name: RABBITMQ_DEFAULT_VHOST
              value: /dev
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - |
                    rabbitmqctl await_startup
                    rabbitmqctl list_vhosts --silent | grep -Fx /dev || rabbitmqctl add_vhost /dev
                    rabbitmqctl set_permissions -p /dev "$RABBITMQ_DEFAULT_USER" ".*" ".*" ".*"
