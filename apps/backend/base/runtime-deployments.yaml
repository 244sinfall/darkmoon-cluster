apiVersion: apps/v1
kind: Deployment
metadata:
  name: referral-service-python-service
  labels:
    app.kubernetes.io/name: referral-service-python-service
    app.kubernetes.io/part-of: backend
    app.kubernetes.io/component: referral-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: referral-service-python-service
      app.kubernetes.io/part-of: backend
      app.kubernetes.io/component: referral-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: referral-service-python-service
        app.kubernetes.io/part-of: backend
        app.kubernetes.io/component: referral-service
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: referral-service-python-service
        image: registryv2.rp-wow.ru/darkmoon-referral-service:v0.1.12
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: referral-service-python-service.DATABASE_URL
        - name: CHARACTER_SERVICE_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: referral-service-python-service.CHARACTER_SERVICE_BASE_URL
        - name: TELNET_SERVICE_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: referral-service-python-service.TELNET_SERVICE_BASE_URL
        resources: {}
