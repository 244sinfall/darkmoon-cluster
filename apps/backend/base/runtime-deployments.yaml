apiVersion: apps/v1
kind: Deployment
metadata:
  name: telnet-service-worker-python-service
  labels:
    app.kubernetes.io/name: telnet-service-worker-python-service
    app.kubernetes.io/part-of: backend
    app.kubernetes.io/component: telnet-service-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telnet-service-worker-python-service
      app.kubernetes.io/part-of: backend
      app.kubernetes.io/component: telnet-service-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telnet-service-worker-python-service
        app.kubernetes.io/part-of: backend
        app.kubernetes.io/component: telnet-service-worker
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: telnet-service-worker-python-service
        image: registryv2.rp-wow.ru/darkmoon-telnet-service:v0.1.2
        imagePullPolicy: Always
        command:
        - celery
        - -A
        - app.tasks
        - worker
        - --loglevel=info
        - --pool=solo
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: telnet-service-worker-python-service.DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: telnet-service-worker-python-service.REDIS_URL
        - name: TELNET_HOST
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: telnet-service-worker-python-service.TELNET_HOST
        - name: TELNET_PORT
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: telnet-service-worker-python-service.TELNET_PORT
        - name: TELNET_USERNAME
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: telnet-service-worker-python-service.TELNET_USERNAME
        - name: TELNET_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: telnet-service-worker-python-service.TELNET_PASSWORD
        resources: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-service-python-service
  labels:
    app.kubernetes.io/name: vpn-service-python-service
    app.kubernetes.io/part-of: backend
    app.kubernetes.io/component: vpn-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vpn-service-python-service
      app.kubernetes.io/part-of: backend
      app.kubernetes.io/component: vpn-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpn-service-python-service
        app.kubernetes.io/part-of: backend
        app.kubernetes.io/component: vpn-service
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: vpn-service-python-service
        image: registryv2.rp-wow.ru/darkmoon-vpn-service:v0.1.4
        imagePullPolicy: Always
        command:
        - /bin/sh
        - -c
        args:
        - alembic upgrade head && uvicorn vpn_service.main:app --host 0.0.0.0 --port 3000
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: VPN_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.VPN_BASE_URL
        - name: VPN_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.VPN_AUTH_TOKEN
        - name: VPN_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.VPN_ENDPOINT
        - name: VPN_ALLOWED_IPS
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.VPN_ALLOWED_IPS
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.DATABASE_URL
        - name: ALEMBIC_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.ALEMBIC_DATABASE_URL
        - name: VPN_SCAN_INTERVAL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: vpn-service-python-service.VPN_SCAN_INTERVAL
        resources: {}
