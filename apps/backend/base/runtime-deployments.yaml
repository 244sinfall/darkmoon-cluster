---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  labels:
    app.kubernetes.io/name: redis-master
    app.kubernetes.io/part-of: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-master
      app.kubernetes.io/part-of: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-master
        app.kubernetes.io/part-of: backend
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 6379
          protocol: TCP
        resources: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-service-api-rust-service
  labels:
    app.kubernetes.io/name: logs-service-api-rust-service
    app.kubernetes.io/part-of: backend
    app.kubernetes.io/component: logs-service-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logs-service-api-rust-service
      app.kubernetes.io/part-of: backend
      app.kubernetes.io/component: logs-service-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logs-service-api-rust-service
        app.kubernetes.io/part-of: backend
        app.kubernetes.io/component: logs-service-api
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: logs-service-api-rust-service
        image: registryv2.rp-wow.ru/dm-logs-service-new:v0.2.2
        imagePullPolicy: IfNotPresent
        command:
        - ./api
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: PSQL_ADDR
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-api-rust-service.PSQL_ADDR
        - name: REDIS_ADDR
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-api-rust-service.REDIS_ADDR
        - name: RMQ_ADDR
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-api-rust-service.RMQ_ADDR
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-api-rust-service.DISCORD_TOKEN
        - name: DEFAULT_DISCORD_CHANNEL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-api-rust-service.DEFAULT_DISCORD_CHANNEL
        resources: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-service-worker-rust-service
  labels:
    app.kubernetes.io/name: logs-service-worker-rust-service
    app.kubernetes.io/part-of: backend
    app.kubernetes.io/component: logs-service-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logs-service-worker-rust-service
      app.kubernetes.io/part-of: backend
      app.kubernetes.io/component: logs-service-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logs-service-worker-rust-service
        app.kubernetes.io/part-of: backend
        app.kubernetes.io/component: logs-service-worker
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: logs-service-worker-rust-service
        image: registryv2.rp-wow.ru/dm-logs-service-new:v0.2.2
        imagePullPolicy: IfNotPresent
        command:
        - /usr/bin/sh
        - -c
        args:
        - update-ca-certificates && ./worker
        env:
        - name: PSQL_ADDR
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-worker-rust-service.PSQL_ADDR
        - name: REDIS_ADDR
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-worker-rust-service.REDIS_ADDR
        - name: RMQ_ADDR
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-worker-rust-service.RMQ_ADDR
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-worker-rust-service.DISCORD_TOKEN
        - name: DEFAULT_DISCORD_CHANNEL
          valueFrom:
            secretKeyRef:
              name: backend-env
              key: logs-service-worker-rust-service.DEFAULT_DISCORD_CHANNEL
        resources: {}
---
