---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dm-referral-rewards-dev
  labels:
    app.kubernetes.io/name: dm-referral-rewards-dev
    app.kubernetes.io/part-of: backend
spec:
  schedule: 0,30 * * * *
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: dm-referral-rewards-dev
            app.kubernetes.io/part-of: backend
        spec:
          restartPolicy: Never
          imagePullSecrets:
          - name: regcred
          containers:
          - name: reward-processor
            image: registryv2.rp-wow.ru/darkmoon-referral-service:v0.1.12
            imagePullPolicy: IfNotPresent
            command:
            - python3
            args:
            - /cron_job.py
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: dm-referral-job-dev.DATABASE_URL
            - name: MYSQL_URL
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: dm-referral-job-dev.MYSQL_URL
            - name: ACCOUNT_LEVELS_TABLE
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: dm-referral-job-dev.ACCOUNT_LEVELS_TABLE
            - name: PYTHONUNBUFFERED
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: dm-referral-job-dev.PYTHONUNBUFFERED
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 512Mi
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: characters-sync
  labels:
    app.kubernetes.io/name: characters-sync
    app.kubernetes.io/part-of: backend
spec:
  schedule: '*/30 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: characters-sync
            app.kubernetes.io/part-of: backend
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
          - name: regcred
          containers:
          - name: sync-service
            image: registryv2.rp-wow.ru/characters-sync-service:v0.1.0
            env:
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.MYSQL_PASSWORD
            - name: MYSQL_TABLE
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.MYSQL_TABLE
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.POSTGRES_PORT
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.POSTGRES_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.POSTGRES_PASSWORD
            - name: POSTGRES_TABLE
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: characters-sync.POSTGRES_TABLE
