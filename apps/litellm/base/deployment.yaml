apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  labels:
    app.kubernetes.io/name: litellm-proxy
    app.kubernetes.io/part-of: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-proxy
        app.kubernetes.io/part-of: litellm
    spec:
      containers:
        - name: litellm
          image: litellm/litellm-database:v1.80.5-stable.1
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            - secretRef:
                name: litellm-env
          env:
            - name: LITELLM_LOG
              value: INFO
            - name: PORT
              value: "4000"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources: {}
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: litellm-config
          secret:
            secretName: litellm-config
            defaultMode: 0644
            items:
              - key: config.yaml
                path: config.yaml
