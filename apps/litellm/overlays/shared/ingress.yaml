apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-proxy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: litellm.rp-wow.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm-proxy
                port:
                  number: 4000
  tls:
    - hosts:
        - litellm.rp-wow.ru
      secretName: litellm-proxy-tls
