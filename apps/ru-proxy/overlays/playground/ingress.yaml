apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ru-proxy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: ru.rp-wow.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ru-proxy
                port:
                  number: 80
  tls:
    - hosts:
        - ru.rp-wow.ru
      secretName: ru-rp-wow-ru-tls
