apiVersion: apps/v1
kind: Deployment
metadata:
  name: ru-proxy
  labels:
    app.kubernetes.io/name: ru-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ru-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ru-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: ru-proxy-nginx-config
            defaultMode: 420
