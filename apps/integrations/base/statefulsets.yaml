---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: integrations-postgres
  labels:
    app.kubernetes.io/name: integrations-postgres
    app.kubernetes.io/part-of: integrations
spec:
  serviceName: postgres-postgresql
  replicas: 1
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: integrations-postgres
      app.kubernetes.io/part-of: integrations
  template:
    metadata:
      labels:
        app.kubernetes.io/name: integrations-postgres
        app.kubernetes.io/part-of: integrations
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - listen_addresses=*
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: wtools_integration_service
            - name: POSTGRES_USER
              value: wtools_integration_service
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integrations-env
                  key: wtools-postgres-password
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -h "$POD_IP" -p 5432 -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -h "$POD_IP" -p 5432 -U "$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        volumeMode: Filesystem
