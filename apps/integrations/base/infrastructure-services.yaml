---
apiVersion: v1
kind: Service
metadata:
  name: postgres-postgresql
  labels:
    app.kubernetes.io/name: integrations-postgres
    app.kubernetes.io/part-of: integrations
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: integrations-postgres
    app.kubernetes.io/part-of: integrations
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
