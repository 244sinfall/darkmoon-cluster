apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - core
  - dev
  - prod

patches:
  # Preserve manual scaling even when an Application syncs for unrelated drift.
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
    patch: |-
      - op: add
        path: /spec/syncPolicy/syncOptions/-
        value: RespectIgnoreDifferences=true
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: "^(cluster-config|litellm|nfs-server-provisioner|backend-dev|game-server-dev|site-dev|backend-prod|integrations-prod|site-prod)$"
    patch: |-
      - op: add
        path: /spec/ignoreDifferences/-
        value:
          group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      - op: add
        path: /spec/ignoreDifferences/-
        value:
          group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/replicas
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: "^(cert-manager|docker-registry|docker-registry-ui|ingress-nginx|local-path-provisioner|vpn|shared-secrets-dev|shared-secrets-prod|shared-secrets-prod-integrations|ru-proxy|test-echo)$"
    patch: |-
      - op: add
        path: /spec/ignoreDifferences
        value:
          - group: apps
            kind: Deployment
            jsonPointers:
              - /spec/replicas
          - group: apps
            kind: StatefulSet
            jsonPointers:
              - /spec/replicas
