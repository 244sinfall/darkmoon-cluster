apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Core platform workloads managed by Argo CD
  sourceRepos:
    - git@github.com:244sinfall/darkmoon-cluster.git
    - https://charts.jetstack.io
    - https://github.com/rancher/local-path-provisioner.git
    - https://kvaps.github.io/charts
    - https://twuni.github.io/docker-registry.helm
    - https://helm.joxit.dev
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
